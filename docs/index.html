<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>电力交易员 · 刷题（在线版）</title>
  <link rel="stylesheet" href="./css/style.css?v=20260409a" />
</head>
<body>
  <div class="app">
    <header class="header">
      <h1>电力交易员 · 刷题</h1>
      <p class="subtitle">在线版 · 错题优先 · 多账号（数据仅在本机浏览器）</p>
      <p class="subtitle" id="whoami" hidden>当前用户：<strong id="whoami-name"></strong></p>
      <button type="button" class="btn ghost" id="btn-logout" hidden>退出登录</button>
    </header>

    <section class="panel" id="auth-panel">
      <h2>登录 / 注册</h2>
      <label class="field">
        用户名（3-32 位，字母/数字/下划线）
        <input type="text" id="auth-username" maxlength="32" autocomplete="username" />
      </label>
      <label class="field">
        密码（至少 6 位）
        <input type="password" id="auth-password" maxlength="64" autocomplete="current-password" />
      </label>
      <div class="actions">
        <button type="button" class="btn primary" id="btn-login">登录</button>
        <button type="button" class="btn" id="btn-register">注册新账号</button>
      </div>
    </section>

    <section class="panel stats" id="stats-panel" hidden>
      <div class="stat"><span class="label">总题数</span><strong id="st-total">—</strong></div>
      <div class="stat"><span class="label">已做</span><strong id="st-done">—</strong></div>
      <div class="stat"><span class="label">未做</span><strong id="st-undone">—</strong></div>
      <div class="stat"><span class="label">正确</span><strong id="st-correct">—</strong></div>
      <div class="stat"><span class="label">错题</span><strong id="st-wrong">—</strong></div>
      <div class="stat"><span class="label">正确率</span><strong id="st-rate">—</strong></div>
    </section>

    <p class="error" id="global-error" hidden></p>

    <section class="panel start-panel" id="start-panel" hidden>
      <p class="summary-line">固定抽题：随机 100 道单选 + 30 道多选 + 40 道判断（错题优先）</p>
      <p class="mode-line">当前模式：<span class="mode-tag" id="mode-tag">普通刷题</span></p>
      <div class="actions">
        <button type="button" class="btn primary" id="btn-start">开始本轮刷题</button>
        <button type="button" class="btn" id="btn-start-wrong">错题集重刷</button>
      </div>
    </section>

    <section class="panel quiz-panel" id="quiz-panel" hidden>
      <div class="quiz-head">
        <span id="quiz-progress">第 0 / 0 题</span>
        <span class="tag" id="q-status"></span>
      </div>
      <p class="q-meta"><span id="q-type-tag">—</span></p>
      <p class="q-hint" id="q-hint"></p>
      <article class="question" id="question-text"></article>
      <div class="choices" id="choices"></div>
      <button type="button" class="btn primary btn-confirm-multi" id="btn-confirm-multi" hidden>确认答案</button>
      <div class="feedback" id="feedback" hidden>
        <p id="feedback-msg"></p>
        <p class="explain" id="feedback-explain"></p>
      </div>
      <div class="actions">
        <button type="button" class="btn" id="btn-next" disabled>下一题</button>
        <button type="button" class="btn ghost" id="btn-abort">结束本轮</button>
      </div>
    </section>

    <section class="panel summary-panel" id="summary-panel" hidden>
      <h2>本轮结束</h2>
      <p class="summary-line">得分：<strong id="sum-score">0</strong> 分（每题 2 分）</p>
      <p class="summary-line">答对：<strong id="sum-correct">0</strong> 题</p>
      <button type="button" class="btn primary" id="btn-back">返回首页</button>
    </section>

    <footer class="footer">每个账号的进度保存在本机 localStorage；新注册用户无历史错题。密码为浏览器端摘要存储，勿用于高敏感场景。</footer>
  </div>
  <script src="./js/app.js?v=20260409a"></script>
</body>
</html>
